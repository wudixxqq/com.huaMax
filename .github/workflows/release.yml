name: Build & attach release APK

# Triggered when you publish a GitHub Release (with your own notes).
# CI builds the debug APK, versions it from the release tag, signs it with
# your debug keystore, and attaches XposedFakeLocation.apk to the release.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Restore debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "::error::DEBUG_KEYSTORE_BASE64 secret is not set. Add it so releases keep a stable signature."
            exit 1
          fi
          mkdir -p "$HOME/.android"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/debug.keystore"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug -PappVersionName="${{ github.event.release.tag_name }}"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk XposedFakeLocation.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" XposedFakeLocation.apk --clobber
